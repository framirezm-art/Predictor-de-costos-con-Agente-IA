services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cost-forecast-backend
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      CORS_ORIGINS: http://localhost:5173
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      NVIDIA_MODEL: ${NVIDIA_MODEL:-deepseek-ai/deepseek-v4-flash}
      NVIDIA_BASE_URL: ${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
    volumes:
      - ./backend/agent_data:/app/agent_data:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000/api/v1
    container_name: cost-forecast-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
